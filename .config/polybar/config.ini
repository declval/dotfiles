[global]
padding = 8pt

[bar/top]
background = ${xrdb:color0}
dpi-x = 120
dpi-y = 120
font-0 = "Noto Sans Mono:size=12:style=Bold;2"
foreground = ${xrdb:foreground}
height = 28pt
module-margin-right = ${global.padding}
modules-center = title
modules-left = bspwm
modules-right = battery date
padding-right = ${global.padding}
wm-restack = bspwm

[module/battery]
type = internal/battery

[module/bspwm]
label-empty = %name%
label-empty-foreground = ${xrdb:color7}
label-empty-padding = ${global.padding}
label-focused = %name%
label-focused-padding = ${global.padding}
label-occupied = %name%
label-occupied-foreground = ${xrdb:color7}
label-occupied-padding = ${global.padding}
label-urgent = %name%
label-urgent-foreground = ${xrdb:color7}
label-urgent-padding = ${global.padding}
type = internal/bspwm

[module/date]
date = %I:%M
type = internal/date

[module/title]
label-maxlen = 64
type = internal/xwindow

[module/tray]
tray-size = 60%
type = internal/tray
